openapi: 3.0.0
info:
  title: Test API
  version: 1.0.0
paths:
  /user:
    get:
      summary: Get user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
components:
